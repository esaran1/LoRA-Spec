baselines:
  autoregressive:
    enabled: false
    implemented: false
    status: registered_not_integrated
    family: decoding
    description: Target-only autoregressive decoding without speculative assistance.
  vanilla_speculative:
    enabled: true
    implemented: true
    status: runnable
    family: decoding
    description: Standard speculative decoding without adapter-aware correction.
  analytical_mean_shift:
    enabled: true
    implemented: true
    status: runnable_offline
    family: analytical
    description: Rank-0 correction using the expected logit shift.
  analytical_low_rank:
    enabled: true
    implemented: true
    status: runnable_offline
    family: analytical
    description: Closed-form low-rank correction derived from the calibrated logit-shift matrix.
  context_dependent:
    enabled: true
    implemented: true
    status: runnable_offline
    family: hybrid
    description: Lightweight coefficient predictor over the dominant analytical correction subspace.
  distillspec_static:
    enabled: false
    implemented: false
    status: registered_not_integrated
    family: training
    description: Static draft-side adaptation or distillation baseline for the LoRA-shifted target.
  eagle_family:
    enabled: false
    implemented: false
    status: registered_not_integrated
    family: training
    description: Stronger learned draft-model baseline representative of EAGLE-style methods.
  micro_lora_upper_bound:
    enabled: true
    implemented: true
    status: runnable
    family: training
    description: Draft-side micro-LoRA distilled from the adapted target, used as the fallback upper bound.
