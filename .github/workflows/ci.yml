name: ci

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Compile
        run: python -m compileall -q src scripts tests
      - name: Verify frozen prompts
        run: python scripts/verify_prompt_splits.py --verbose
      - name: Check SLURM shell syntax
        run: for script in slurm/*.sh; do bash -n "$script"; done
      - name: Test
        run: pytest -q
      - name: Build package
        run: python -m build
